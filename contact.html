<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - María Paula Baca</title>
    <link href="https://fonts.googleapis.com/css2?family=Amatica+SC:wght@400;700&family=Homemade+Apple&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="contact-page">
    <nav class="menu-bar" id="menu-bar" aria-label="Menú principal">
        <a href="index.html" class="menu-bar-link">Home</a>
        <a href="about.html" class="menu-bar-link">About me</a>
        <a href="work.html" class="menu-bar-link">My work</a>
        <button type="button" class="menu-toggle" id="menu-toggle" aria-label="Abrir menú">
            <img src="imgs/menu_icon.png" alt="Menú" class="menu-toggle-icon">
        </button>
    </nav>

    <main class="page page--contact">
        <div class="contact-left">
            <h1 class="contact-title">Contact</h1>
            <p class="contact-intro">Lets create something cool together.<br>Message me anytime or simply say hi !!</p>

            <form class="contact-form" id="contact-form">
                <label class="contact-label" for="contact-name">Name</label>
                <input type="text" id="contact-name" name="name" class="contact-input" required placeholder="Tu nombre">

                <label class="contact-label" for="contact-email">Email</label>
                <input type="email" id="contact-email" name="email" class="contact-input" required placeholder="tu@email.com">

                <label class="contact-label" for="contact-message">Message</label>
                <textarea id="contact-message" name="message" class="contact-textarea" required placeholder="Tu mensaje"></textarea>

                <button type="submit" class="contact-submit">send</button>
            </form>
        </div>

        <aside class="contact-right">
            <div class="contact-note">
                <div class="contact-note-content">
                    <p class="contact-sign">With love, Maria Paula Baca</p>
                    <div class="contact-icons">
                    <a href="https://wa.me/09967857753" class="contact-icon contact-icon-wa" target="_blank" rel="noopener" aria-label="WhatsApp"><img src="imgs/Whatsapp.png" alt="WhatsApp"></a>
                    <a href="https://www.instagram.com/mariapaulabaca_?igsh=OWp0amZueHVjODcy&utm_source=qr" class="contact-icon contact-icon-ig" target="_blank" rel="noopener" aria-label="Instagram"><img src="imgs/Instagram.png" alt="Instagram"></a>
                    <a href="https://www.linkedin.com/in/maria-paula-baca-carrion-a9679931a?utm_source=share_via&utm_content=profile&utm_medium=member_ios" class="contact-icon contact-icon-in" target="_blank" rel="noopener" aria-label="Linkedn"><img src="imgs/Linkedin.png" alt="Linkedin"></a>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <script>
        (function () {
            var bar = document.getElementById('menu-bar');
            var toggle = document.getElementById('menu-toggle');
            toggle.addEventListener('click', function () {
                bar.classList.toggle('is-open');
                bar.setAttribute('aria-expanded', bar.classList.contains('is-open'));
            });
        })();

        (function () {
            var MI_CORREO = 'mariabaca2004@gmail.com';  
            var form = document.getElementById('contact-form');
            if (!form) return;
            form.addEventListener('submit', function (e) {
                e.preventDefault();
                var name = document.getElementById('contact-name').value;
                var email = document.getElementById('contact-email').value;
                var message = document.getElementById('contact-message').value;
                var subject = 'Mensaje desde tu portfolio';
                var body = 'Nombre: ' + name + '\nEmail: ' + email + '\n\nMensaje:\n' + message;
                window.location.href = 'mailto:' + MI_CORREO + '?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
                form.reset();
            });
        })();
    </script>
</body>
</html>
